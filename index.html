<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Example Directory</title>

<style>
* {
  touch-action: manipulation;
}
:root{
    --bg:#ffffff;
    --text:#000000;
    --border:#cfcfcf;
    --hover:#f5f5f5;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:system-ui,sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

header{
    padding:18px;
    border-bottom:1px solid var(--border);
    font-size:1.3rem;
    font-weight:600;
}

#container{
    flex:1;
    display:flex;
    flex-direction:column;
}

.list-item{
    padding:18px;
    border-bottom:1px solid var(--border);
    cursor:pointer;
}

.list-item:hover{
    background:var(--hover);
}

.toolbar{
    display:flex;
    gap:10px;
    padding:12px;
    border-bottom:1px solid var(--border);
}

button{
    background:white;
    border:1px solid var(--border);
    padding:10px 16px;
    cursor:pointer;
}

button:hover{
    background:var(--hover);
}

.slide{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:30px;
    gap:20px;
    text-align:center;
}

.slide img{
    max-width:min(90vw,900px);
    max-height:60vh;
    border:1px solid var(--border);
    object-fit:contain;
}

.slide-text{
    max-width:900px;
    font-size:1.2rem;
    line-height:1.6;
}

.slide-counter{
    padding:12px;
    border-top:1px solid var(--border);
}
.divider {
    padding: 12px 18px;
    font-weight: 600;
    border-bottom: 1px solid var(--border);
    background: #fafafa;
    color: #333;
}
</style>
</head>

<body>
<!--

<header>Example Directory</header>
<div id="container"></div>
<!--

<script>
function decodeContent(value){
    if(typeof value !== "string") return value;

    try{
        // Reverse text (use if base 64 thing goes out)
        if(value.startsWith("REV:")){
            const str = value.replace("REV:","");
            return str.split("").reverse().join("");
        }

        // Base 64 so the po po dosnt catch your evil doings
        if(value.startsWith("BASE64:")){
            const clean = value.replace("BASE64:","").replace(/\s/g,"");
            return atob(clean);
        }

    }catch(e){
        return "[Decode Error]";
    }

    return value;
}
/* ❌❌❌❌❌❌❌❌❌❌❌ DO NOT EDIT ABOVE HERE!! ❌❌❌❌❌❌❌❌❌❌❌❌❌ */
const libraryData = {
/* YOUR CODE GOES HERE ALSO DO NOT REMOVE CONST LIBRARY DATA OR THE }; */
  
"Read Me!": {
    type: "text",
    content: `Normal text

Supports multiple lines

Dont forget to visit gourdier.github.io/directorylibrary/doc.html !`
}

};
/* I use these emojis so you can easily spot start and end when scrolling fast */
/* ❌❌❌❌❌❌❌❌❌❌❌ DO NOT EDIT BELOW HERE!! ❌❌❌❌❌❌❌❌❌❌❌❌❌ */
const container = document.getElementById("container");
const navigationStack = [];

function currentFolder(){
    let ref = libraryData;

    for(const name of navigationStack){
        ref = ref[name].items;
    }

    return ref;
}

function renderList(){
    container.innerHTML = "";

    const folder = currentFolder();

    // BACK button
    if(navigationStack.length){
        const back = document.createElement("div");
        back.className = "list-item";
        back.textContent = "← Back";
        back.onclick = () => {
            navigationStack.pop();
            renderList();
        };
        container.appendChild(back);
    }

    // LIST ITEMS
    Object.entries(folder).forEach(([name, item]) => {
if(item.type === "divider"){
    const div = document.createElement("div");
    div.className = "divider";

    div.textContent = decodeContent(name);

    container.appendChild(div);
    return;
}
        const row = document.createElement("div");
        row.className = "list-item";

        let suffix = "";
        if(item.type === "folder") suffix = " 📁";
        if(item.type === "slideshow") suffix = " ▶";
        if(item.type === "text") suffix = " 📄";

row.textContent = decodeContent(name) + suffix;

        row.onclick = () => {
            if(item.type === "folder"){
                navigationStack.push(name);
                renderList();
            }
            else if(item.type === "text"){
                openText(item);
            }
            else if(item.type === "slideshow"){
                openSlideshow(item);
            }
        };

        container.appendChild(row);
    });
}

function openText(item){

    container.innerHTML = `
        <div class="toolbar">
            <button onclick="renderList()">Back</button>
        </div>

        <div class="slide">
            <div class="slide-text">
                ${decodeContent(item.content).replace(/\n/g,"<br>")}
            </div>
        </div>
    `;
}

function openSlideshow(item){

    let index = 0;

    function renderSlide(){

        const slide = item.slides[index];

        container.innerHTML = `
            <div class="toolbar">
                <button id="backBtn">❌ Back</button>
                <button id="prevBtn">⬅️ Previous</button>
                <button id="nextBtn">Next ➡️</button>
            </div>

            <div class="slide">
                ${slide.image ? `<img src="${slide.image}">` : ""}
${slide.text ? `<div class="slide-text">${decodeContent(slide.text).replace(/\n/g,"<br>")}</div>` : ""}
                <div class="slide-counter">${index+1} / ${item.slides.length}</div>
            </div>
        `;

        document.getElementById("backBtn").onclick = renderList;

        document.getElementById("prevBtn").onclick = ()=>{
            index = Math.max(0,index-1);
            renderSlide();
        };

        document.getElementById("nextBtn").onclick = ()=>{
            index = Math.min(item.slides.length-1,index+1);
            renderSlide();
        };
    }

    renderSlide();
}

renderList();

</script>

</body>
</html>
